<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expenses">
<title>Log Expense</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1F3864;--blue:#2980B9;--light:#EAF4FB;--green:#27AE60;
    --red:#E74C3C;--bg:#F0F4F9;--card:#fff;--border:#DDE6F0;
    --text:#1a2640;--muted:#7a8ba8;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
  .header{background:linear-gradient(135deg,var(--navy),#2c5282);padding:52px 24px 28px;text-align:center;}
  .header h1{color:white;font-size:22px;font-weight:700;}
  .header p{color:rgba(255,255,255,0.65);font-size:13px;margin-top:4px;}
  .header-icon{font-size:32px;display:block;margin-bottom:8px;}
  .card{background:var(--card);border-radius:var(--radius);margin:-16px 16px 0;padding:24px 20px;box-shadow:0 4px 24px rgba(31,56,100,0.10);}
  .field{margin-bottom:18px;}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;}
  input,select,textarea{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:var(--text);background:var(--bg);appearance:none;-webkit-appearance:none;outline:none;transition:border-color 0.2s;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);background:white;}
  input[type="number"]{-moz-appearance:textfield;}
  input[type="number"]::-webkit-inner-spin-button{display:none;}
  .amount-wrap{position:relative;}
  .amount-wrap .currency{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:700;color:var(--blue);pointer-events:none;}
  .amount-wrap input{padding-left:52px;font-size:24px;font-weight:700;color:var(--navy);background:var(--light);border-color:var(--blue);}
  .select-wrap{position:relative;}
  .select-wrap::after{content:'▾';position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .divider{height:1px;background:var(--border);margin:20px 0;}
  textarea{resize:none;height:80px;font-size:15px;}
  .btn-submit{width:100%;padding:18px;background:linear-gradient(135deg,var(--blue),#1a6fa3);color:white;border:none;border-radius:14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(41,128,185,0.35);transition:transform 0.15s;-webkit-appearance:none;}
  .btn-submit:active{transform:scale(0.98);}
  .btn-submit:disabled{background:#9ab4cc;box-shadow:none;}
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy);color:white;padding:14px 24px;border-radius:40px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.25);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);z-index:999;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--red);}
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🏠</span>
  <h1>Log Expense</h1>
  <p>Faizan & Simi</p>
</div>

<div class="card">

  <div class="field">
    <label>Amount</label>
    <div class="amount-wrap">
      <span class="currency">AED</span>
      <input type="number" id="amount" placeholder="0.00" inputmode="decimal" step="0.01" min="0">
    </div>
  </div>

  <div class="field">
    <label>Description</label>
    <input type="text" id="description" placeholder="e.g. Carrefour groceries" autocomplete="off">
  </div>

  <div class="field">
    <label>Category</label>
    <div class="select-wrap">
      <select id="category">
        <option value="">Select category...</option>
        <option>Groceries</option>
        <option>Dining Out</option>
        <option>Utilities</option>
        <option>Rent/Mortgage</option>
        <option>Transport</option>
        <option>School/Kids</option>
        <option>Health</option>
        <option>Entertainment</option>
        <option>Shopping</option>
        <option>Travel</option>
        <option>Household</option>
        <option>Subscriptions</option>
        <option>Other</option>
      </select>
    </div>
  </div>

  <div class="divider"></div>

  <div class="grid-2">
    <div class="field">
      <label>Paid By</label>
      <div class="select-wrap">
        <select id="paidBy">
          <option value="">Select...</option>
          <option>Faizan</option>
          <option>Simi</option>
          <option>Joint</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Split</label>
      <div class="select-wrap">
        <select id="splitType">
          <option value="">Select...</option>
          <option>Shared</option>
          <option>Faizan</option>
          <option>Simi</option>
        </select>
      </div>
    </div>
  </div>

  <div class="field">
    <label>Payment Mode</label>
    <div class="select-wrap">
      <select id="paymentMode">
        <option value="">Select mode...</option>
        <option>Credit Card</option>
        <option>Debit Card</option>
        <option>Cash</option>
        <option>Bank Transfer</option>
        <option>Online Wallet</option>
      </select>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Notes (optional)</label>
    <textarea id="notes" placeholder="Any extra details..."></textarea>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitExpense()">
    Add Expense
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw1ibuZ-1uK1Q-VhSG0hqLXtogMpqYspLryv87AxFGt5y1pE_ISo3iZlPijovXN5qY/exec';

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function today() {
    return new Date().toISOString().split('T')[0];
  }

  async function submitExpense() {
    const amount      = document.getElementById('amount').value.trim();
    const description = document.getElementById('description').value.trim();
    const category    = document.getElementById('category').value;
    const paidBy      = document.getElementById('paidBy').value;
    const splitType   = document.getElementById('splitType').value;
    const paymentMode = document.getElementById('paymentMode').value;
    const notes       = document.getElementById('notes').value.trim();

    if (!amount)      { showToast('Please enter an amount', 'error'); return; }
    if (!category)    { showToast('Please select a category', 'error'); return; }
    if (!paidBy)      { showToast('Please select who paid', 'error'); return; }
    if (!splitType)   { showToast('Please select a split type', 'error'); return; }
    if (!paymentMode) { showToast('Please select a payment mode', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving...';

    const params = new URLSearchParams({
      date: today(), amount, description, category,
      paidBy, splitType, paymentMode, notes
    });

    const fullUrl = `${SCRIPT_URL}?${params.toString()}`;

    await new Promise((resolve) => {
      const img = new Image();
      img.onload = img.onerror = resolve;
      img.src = fullUrl;
      setTimeout(resolve, 4000);
    });

    showToast('✅ Expense logged!', 'success');
    document.getElementById('amount').value = '';
    document.getElementById('description').value = '';
    document.getElementById('category').value = '';
    document.getElementById('paidBy').value = '';
    document.getElementById('splitType').value = '';
    document.getElementById('paymentMode').value = '';
    document.getElementById('notes').value = '';
    document.getElementById('amount').focus();

    btn.disabled = false;
    btn.innerHTML = 'Add Expense';
  }
</script>
</body>
</html>
